<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TASK JOHN DARK</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F0E0C">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        :root {
            --bg-primary: #0F0E0C;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #f4d03f;
            --accent-hover: #d4b020;
            --border: #333;
            --task-card: #1a1a1a;
            --sidebar-bg: #0a0a0a;
            --input-bg: #252525;
            --shadow: rgba(0,0,0,0.5);
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8e8;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent: #d4a017;
            --accent-hover: #b8860b;
            --border: #ddd;
            --task-card: #ffffff;
            --sidebar-bg: #f0f0f0;
            --input-bg: #ffffff;
            --shadow: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sidebar-header .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-section {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section-title {
            padding: 8px 20px;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .sidebar-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            background: var(--bg-tertiary);
        }

        .sidebar-item.active {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .sidebar-item .icon {
            font-size: 18px;
            width: 20px;
        }

        .sidebar-item .label {
            flex: 1;
            font-size: 14px;
        }

        .sidebar-item .count {
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .sidebar-item.active .count {
            background: rgba(0,0,0,0.2);
        }

        .new-project-btn {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .new-project-btn:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .main-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-primary);
        }

        .main-header h2 {
            font-size: 32px;
            font-weight: 700;
        }

        .main-header .meta {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-toggle, .mobile-menu-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--bg-tertiary);
        }

        .mobile-menu-toggle {
            display: none;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .focus-banner {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .focus-banner .icon {
            font-size: 20px;
        }

        .focus-banner .text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .task-card {
            background: var(--task-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid var(--accent);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .task-card.pinned {
            border-left-color: #ffd700;
        }

        .task-card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .task-checkbox:hover {
            border-color: var(--accent);
        }

        .task-checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .task-checkbox.checked::after {
            content: '✓';
            color: var(--bg-primary);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .task-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag-priority {
            background: rgba(220, 38, 38, 0.2);
            color: #dc2626;
        }

        .tag-date {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .tag-project {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .task-description {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.5;
        }

        .task-pin {
            margin-left: auto;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
        }

        .task-pin.active {
            color: #ffd700;
        }

        /* Add Task Form */
        .add-task-section {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 24px 32px;
        }

        .add-task-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-input, .form-textarea, .form-select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 150px;
        }

        .form-checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .form-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        /* Calendar View */
        .calendar-view {
            display: none;
        }

        .calendar-view.active {
            display: block;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .calendar-nav {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-primary);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .calendar-day-header {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .calendar-day {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 80px;
        }

        .calendar-day:hover {
            border-color: var(--accent);
        }

        .calendar-day.today {
            border-color: var(--accent);
            background: rgba(244, 208, 63, 0.1);
        }

        .calendar-day-number {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .calendar-day-tasks {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .calendar-day.has-tasks .calendar-day-tasks {
            color: var(--accent);
        }

        /* Task list for selected day */
        .day-tasks-list {
            margin-top: 24px;
        }

        .day-tasks-list h4 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .mobile-menu-toggle {
                display: block;
            }

            .main-header {
                padding: 16px 20px;
            }

            .main-header h2 {
                font-size: 24px;
            }

            .content {
                padding: 16px 20px;
            }

            .add-task-section {
                padding: 16px 20px;
            }

            .form-row {
                flex-direction: column;
            }

            .form-group {
                min-width: 100%;
            }

            .calendar-grid {
                gap: 4px;
            }

            .calendar-day {
                min-height: 60px;
                padding: 4px;
            }

            .calendar-day-number {
                font-size: 12px;
            }

            .calendar-day-tasks {
                font-size: 8px;
            }
        }

        /* Overlay for mobile sidebar */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* View sections */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Operativo</h1>
                <div class="subtitle">Buon pomeriggio</div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Viste</div>
                <div class="sidebar-item active" onclick="switchView('today')">
                    <span class="icon">☀️</span>
                    <span class="label">Oggi</span>
                    <span class="count" id="count-today">7</span>
                </div>
                <div class="sidebar-item" onclick="switchView('waiting')">
                    <span class="icon">⏸️</span>
                    <span class="label">In attesa</span>
                    <span class="count" id="count-waiting">2</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Progetti</div>
                <div id="projects-list">
                    <!-- Projects will be dynamically inserted here -->
                </div>
                <div class="new-project-btn" onclick="openNewProjectModal()">
                    <span class="icon">➕</span>
                    <span class="label">Nuovo Progetto</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="main-header">
                <div>
                    <h2 id="view-title">Oggi</h2>
                    <div class="meta" id="view-meta">3 pinned • 4 urgenti</div>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" onclick="toggleTheme()" title="Cambia tema">
                        🌓
                    </button>
                    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
                        ☰
                    </button>
                </div>
            </div>

            <div class="content">
                <!-- Today View -->
                <div id="view-today" class="view-section active">
                    <div class="focus-banner">
                        <span class="icon">🎯</span>
                        <span class="text">Focus della giornata. Completa questi prima di passare ad altro.</span>
                    </div>
                    <div id="tasks-today">
                        <!-- Tasks will be dynamically inserted here -->
                    </div>
                </div>

                <!-- Waiting View -->
                <div id="view-waiting" class="view-section">
                    <div id="tasks-waiting">
                        <!-- Tasks will be dynamically inserted here -->
                    </div>
                </div>

                <!-- Calendar View -->
                <div id="view-calendar" class="view-section calendar-view">
                    <div class="calendar-header">
                        <button class="calendar-nav" onclick="changeMonth(-1)">←</button>
                        <h3 id="calendar-month-year"></h3>
                        <button class="calendar-nav" onclick="changeMonth(1)">→</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <!-- Calendar will be dynamically generated -->
                    </div>
                    <div class="day-tasks-list" id="day-tasks-list">
                        <!-- Tasks for selected day -->
                    </div>
                </div>
            </div>

            <!-- Add Task Form -->
            <div class="add-task-section">
                <form class="add-task-form" onsubmit="addTask(event)">
                    <input type="text" class="form-input" placeholder="Cosa devi fare?" id="task-title" required>
                    <textarea class="form-textarea" placeholder="Note (opzionale)" id="task-notes"></textarea>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <select class="form-select" id="task-priority">
                                <option value="Bassa">Bassa</option>
                                <option value="Media" selected>Media</option>
                                <option value="Alta">Alta</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <select class="form-select" id="task-project">
                                <!-- Projects will be dynamically inserted -->
                            </select>
                        </div>
                        <div class="form-group">
                            <input type="date" class="form-input" id="task-date">
                        </div>
                    </div>

                    <div class="form-checkbox-group">
                        <label class="form-checkbox">
                            <input type="checkbox" id="task-pin">
                            <span>⭐ Pin oggi</span>
                        </label>
                        <label class="form-checkbox">
                            <input type="checkbox" id="task-waiting">
                            <span>⏸️ In attesa di</span>
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="switchView('calendar')">📅 Calendario</button>
                        <button type="submit" class="btn btn-primary">Aggiungi</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- New Project Modal -->
    <div class="modal" id="new-project-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeNewProjectModal()">×</button>
            <div class="modal-header">
                <h3>Nuovo Progetto</h3>
                <div style="color: var(--text-secondary);">Crea un nuovo progetto per organizzare i task</div>
            </div>
            <form onsubmit="createNewProject(event)">
                <div class="form-group" style="margin-bottom: 20px;">
                    <input type="text" class="form-input" placeholder="Nome del progetto" id="new-project-name" required>
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <input type="text" class="form-input" placeholder="Icona (emoji)" id="new-project-icon">
                    <div style="font-size: 12px; color: var(--text-secondary); margin-top: 6px;">
                        Inserisci un'emoji per identificare il progetto
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeNewProjectModal()">Annulla</button>
                    <button type="submit" class="btn btn-primary">Crea Progetto</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data
        let projects = JSON.parse(localStorage.getItem('projects')) || [
            { id: 1, name: 'Concerto', icon: '' },
            { id: 2, name: 'Eurofiltri', icon: '⚙️' },
            { id: 3, name: 'Pact', icon: '🤝' },
            { id: 4, name: 'Studio Mainardi', icon: '🏢' },
            { id: 5, name: 'Rialziamoci', icon: '📈' }
        ];

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [
            {
                id: 1,
                title: 'Trovare nuovo nome per la startup',
                notes: "Marchio 'Radio Italia Il Concerto' già registrato. Per l'incontro avvocati di domani.",
                priority: 'Alta',
                projectId: 1,
                date: new Date().toISOString().split('T')[0],
                pinned: true,
                waiting: false,
                completed: false
            },
            {
                id: 2,
                title: 'Preparare materiali incontro avvocati',
                notes: 'Validazione startup + finanziamento 500k (90% fondo perduto)',
                priority: 'Alta',
                projectId: 1,
                date: new Date().toISOString().split('T')[0],
                pinned: true,
                waiting: false,
                completed: false
            },
            {
                id: 3,
                title: 'Acconto iniziale per il sito',
                notes: 'Aspetto: Paolo (capo Eurofiltri) da 5g\nSito €2.800 — principio fisso: niente acconto, niente lavoro',
                priority: 'Alta',
                projectId: 2,
                date: new Date().toISOString().split('T')[0],
                pinned: false,
                waiting: true,
                completed: false
            },
            {
                id: 4,
                title: 'Proposta pacchetto AI automation €18k',
                notes: 'Obiettivo: chiudere entro 1 mese',
                priority: 'Alta',
                projectId: 4,
                date: '2026-05-27',
                pinned: false,
                waiting: false,
                completed: false
            }
        ];

        let currentView = 'today';
        let currentDate = new Date();
        let selectedCalendarDay = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            renderProjects();
            renderTasks();
            updateCounts();
            
            // Set default date to today
            document.getElementById('task-date').valueAsDate = new Date();
        });

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Update meta theme color
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (metaThemeColor) {
                metaThemeColor.setAttribute('content', newTheme === 'light' ? '#f5f5f5' : '#0F0E0C');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (metaThemeColor) {
                metaThemeColor.setAttribute('content', savedTheme === 'light' ? '#f5f5f5' : '#0F0E0C');
            }
        }

        // Sidebar Toggle (Mobile)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // View Switching
        function switchView(view) {
            currentView = view;
            
            // Update sidebar active state
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if (view === 'today') {
                document.querySelectorAll('.sidebar-item')[0].classList.add('active');
            } else if (view === 'waiting') {
                document.querySelectorAll('.sidebar-item')[1].classList.add('active');
            }
            
            // Update view sections
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.remove('active');
            });
            
            if (view === 'calendar') {
                document.getElementById('view-calendar').classList.add('active');
                document.getElementById('view-title').textContent = 'Calendario';
                document.getElementById('view-meta').textContent = '';
                renderCalendar();
            } else if (view === 'today') {
                document.getElementById('view-today').classList.add('active');
                document.getElementById('view-title').textContent = 'Oggi';
                document.getElementById('view-meta').textContent = '3 pinned • 4 urgenti';
            } else if (view === 'waiting') {
                document.getElementById('view-waiting').classList.add('active');
                document.getElementById('view-title').textContent = 'In attesa';
                document.getElementById('view-meta').textContent = '';
                renderWaitingTasks();
            }
            
            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }

        // Render Projects
        function renderProjects() {
            const projectsList = document.getElementById('projects-list');
            const projectSelect = document.getElementById('task-project');
            
            // Clear existing
            projectsList.innerHTML = '';
            projectSelect.innerHTML = '';
            
            // Add default option to select
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = 'Seleziona progetto';
            projectSelect.appendChild(defaultOption);
            
            projects.forEach(project => {
                // Sidebar item
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.onclick = () => filterByProject(project.id);
                item.innerHTML = `
                    <span class="icon">${project.icon}</span>
                    <span class="label">${project.name}</span>
                    <span class="count">${tasks.filter(t => t.projectId === project.id && !t.completed).length}</span>
                `;
                projectsList.appendChild(item);
                
                // Select option
                const option = document.createElement('option');
                option.value = project.id;
                option.textContent = `${project.icon} ${project.name}`;
                projectSelect.appendChild(option);
            });
        }

        // Render Tasks
        function renderTasks() {
            const today = new Date().toISOString().split('T')[0];
            const todayTasks = tasks.filter(t => t.date === today && !t.waiting && !t.completed);
            
            const container = document.getElementById('tasks-today');
            container.innerHTML = '';
            
            todayTasks.forEach(task => {
                const project = projects.find(p => p.id === task.projectId);
                const taskCard = createTaskCard(task, project);
                container.appendChild(taskCard);
            });
        }

        function renderWaitingTasks() {
            const waitingTasks = tasks.filter(t => t.waiting && !t.completed);
            
            const container = document.getElementById('tasks-waiting');
            container.innerHTML = '';
            
            if (waitingTasks.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">Nessun task in attesa</div>';
                return;
            }
            
            waitingTasks.forEach(task => {
                const project = projects.find(p => p.id === task.projectId);
                const taskCard = createTaskCard(task, project);
                container.appendChild(taskCard);
            });
        }

        function createTaskCard(task, project) {
            const div = document.createElement('div');
            div.className = `task-card ${task.pinned ? 'pinned' : ''}`;
            div.innerHTML = `
                <div class="task-card-header">
                    <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})"></div>
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">
                            <span class="task-tag tag-priority">${task.priority}</span>
                            <span class="task-tag tag-date">${formatDate(task.date)}</span>
                            ${project ? `<span class="task-tag tag-project">${project.icon} ${project.name}</span>` : ''}
                        </div>
                        ${task.notes ? `<div class="task-description">${task.notes}</div>` : ''}
                    </div>
                    <div class="task-pin ${task.pinned ? 'active' : ''}" onclick="togglePin(${task.id})">⭐</div>
                </div>
            `;
            return div;
        }

        // Add Task
        function addTask(event) {
            event.preventDefault();
            
            const title = document.getElementById('task-title').value;
            const notes = document.getElementById('task-notes').value;
            const priority = document.getElementById('task-priority').value;
            const projectId = parseInt(document.getElementById('task-project').value) || null;
            const date = document.getElementById('task-date').value;
            const pinned = document.getElementById('task-pin').checked;
            const waiting = document.getElementById('task-waiting').checked;
            
            const newTask = {
                id: Date.now(),
                title,
                notes,
                priority,
                projectId,
                date,
                pinned,
                waiting,
                completed: false
            };
            
            tasks.push(newTask);
            saveTasks();
            
            // Reset form
            document.getElementById('task-title').value = '';
            document.getElementById('task-notes').value = '';
            document.getElementById('task-pin').checked = false;
            document.getElementById('task-waiting').checked = false;
            
            // Re-render
            if (currentView === 'today') {
                renderTasks();
            } else if (currentView === 'waiting') {
                renderWaitingTasks();
            }
            updateCounts();
            renderProjects();
            
            // Show success feedback
            alert('Task aggiunto con successo!');
        }

        // Toggle Task Completion
        function toggleTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                renderWaitingTasks();
                updateCounts();
                renderProjects();
            }
        }

        // Toggle Pin
        function togglePin(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.pinned = !task.pinned;
                saveTasks();
                renderTasks();
                updateCounts();
            }
        }

        // Create New Project
        function createNewProject(event) {
            event.preventDefault();
            
            const name = document.getElementById('new-project-name').value;
            const icon = document.getElementById('new-project-icon').value || '📁';
            
            const newProject = {
                id: Date.now(),
                name,
                icon
            };
            
            projects.push(newProject);
            localStorage.setItem('projects', JSON.stringify(projects));
            
            closeNewProjectModal();
            renderProjects();
            
            // Reset form
            document.getElementById('new-project-name').value = '';
            document.getElementById('new-project-icon').value = '';
            
            alert('Progetto creato con successo!');
        }

        // Modal Functions
        function openNewProjectModal() {
            document.getElementById('new-project-modal').classList.add('active');
        }

        function closeNewProjectModal() {
            document.getElementById('new-project-modal').classList.remove('active');
        }

        // Calendar Functions
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno',
                'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
            
            document.getElementById('calendar-month-year').textContent = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1; // Make Monday first
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            // Day headers
            const dayHeaders = ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'];
            dayHeaders.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-day-header';
                header.textContent = day;
                grid.appendChild(header);
            });
            
            // Empty cells
            for (let i = 0; i < adjustedFirstDay; i++) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
            }
            
            // Days
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTasks = tasks.filter(t => t.date === dateStr && !t.completed);
                
                const dayCell = document.createElement('div');
                dayCell.className = `calendar-day ${day === today.getDate() && month === today.getMonth() && year === today.getFullYear() ? 'today' : ''} ${dayTasks.length > 0 ? 'has-tasks' : ''}`;
                dayCell.onclick = () => selectDay(dateStr);
                
                dayCell.innerHTML = `
                    <div class="calendar-day-number">${day}</div>
                    ${dayTasks.length > 0 ? `<div class="calendar-day-tasks">${dayTasks.length} task</div>` : ''}
                `;
                
                grid.appendChild(dayCell);
            }
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        function selectDay(dateStr) {
            selectedCalendarDay = dateStr;
            const dayTasks = tasks.filter(t => t.date === dateStr && !t.completed);
            
            const container = document.getElementById('day-tasks-list');
            container.innerHTML = `<h4>Task per ${formatDate(dateStr)}</h4>`;
            
            if (dayTasks.length === 0) {
                container.innerHTML += '<div style="color: var(--text-secondary); padding: 20px; text-align: center;">Nessun task per questo giorno</div>';
            } else {
                dayTasks.forEach(task => {
                    const project = projects.find(p => p.id === task.projectId);
                    const taskCard = createTaskCard(task, project);
                    container.appendChild(taskCard);
                });
            }
        }

        // Utility Functions
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            if (dateStr === today.toISOString().split('T')[0]) {
                return 'Oggi';
            } else if (dateStr === tomorrow.toISOString().split('T')[0]) {
                return 'Domani';
            } else {
                return date.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
            }
        }

        function updateCounts() {
            const today = new Date().toISOString().split('T')[0];
            const todayCount = tasks.filter(t => t.date === today && !t.waiting && !t.completed).length;
            const waitingCount = tasks.filter(t => t.waiting && !t.completed).length;
            
            document.getElementById('count-today').textContent = todayCount;
            document.getElementById('count-waiting').textContent = waitingCount;
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function filterByProject(projectId) {
            const project = projects.find(p => p.id === projectId);
            const projectTasks = tasks.filter(t => t.projectId === projectId && !t.completed);
            
            document.getElementById('view-title').textContent = `${project.icon} ${project.name}`;
            document.getElementById('view-meta').textContent = `${projectTasks.length} task`;
            
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.remove('active');
            });
            
            const container = document.createElement('div');
            container.id = 'view-project-filter';
            container.className = 'view-section active';
            
            const content = document.querySelector('.content');
            const existingFilter = document.getElementById('view-project-filter');
            if (existingFilter) {
                existingFilter.remove();
            }
            
            content.insertBefore(container, content.children[0]);
            
            projectTasks.forEach(task => {
                const taskCard = createTaskCard(task, project);
                container.appendChild(taskCard);
            });
        }

        // Close modal on outside click
        document.getElementById('new-project-modal').addEventListener('click', (e) => {
            if (e.target.id === 'new-project-modal') {
                closeNewProjectModal();
            }
        });
    </script>
</body>
</html>
